name: CI
on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint + Typy + Testy + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4
      - name: Nastavení pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.33.0

      - name: Nastavení Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: src/pnpm-lock.yaml

      - name: Instalace závislostí
        run: |
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Spuštění linteru
        run: pnpm lint

      - name: Kontrola typů
        run: pnpm check-types

      - name: Spuštění testů
        run: pnpm test

      - name: Build projektu
        run: pnpm build
