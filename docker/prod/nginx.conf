server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # SPA - klientsky routing (TanStack Router), fallback na index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
